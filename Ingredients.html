<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末世生存指南 - 食材物資圖鑑</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #f39c12;
            --section-border: #444;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ingredients-container {
            width: 100%;
            max-width: 900px;
            margin-top: 60px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .ingredients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .ingredient-card {
            background-color: var(--card-bg);
            border: 1px solid var(--section-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .ingredient-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.2);
        }

        .image-container {
            width: 100%;
            height: 160px;
            background-color: #1a1a1a;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--section-border);
        }

        .no-img-text {
            color: #555;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .ingredient-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .ingredient-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .rarity-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: normal;
        }
        .rare-white { background: #555; color: #fff; }
        .rare-green { background: #2ecc71; color: #1a1a1a; }
        .rare-blue { background: #3498db; color: #fff; }

        .description {
            font-size: 0.95rem;
            color: #ddd;
            line-height: 1.5;
            margin: 0 0 15px 0;
            flex-grow: 1;
        }

        .source-box {
            background-color: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #5dade2;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .source-title {
            font-weight: bold;
            color: #5dade2;
            margin-bottom: 3px;
        }

        .source-text {
            color: #bbb;
        }

        /* 💡 側邊欄與選單 */
        .top-nav-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 99;
        }
        
        .menu-btn {
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-color);
            background-color: var(--card-bg);
            border: 1px solid var(--accent-color);
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .menu-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }
        
        .sidebar {
            position: fixed;
            top: 0; 
            left: -250px; 
            width: 250px; 
            height: 100%;
            background-color: var(--card-bg);
            z-index: 2000; 
            transition: 0.3s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            padding-top: 60px;
            box-sizing: border-box;
            border-right: 1px solid var(--section-border);
        }
        
        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--section-border);
            transition: all 0.2s;
        }
        
        .sidebar a:hover {
            background-color: var(--accent-color);
            color: #fff;
        }
        
        .close-sidebar {
            position: absolute;
            top: 15px; 
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <span class="close-sidebar" onclick="toggleSidebar(false)">&times;</span>
    <a href="index.html">🏠 主頁</a>
    <a href="recipes-page.html">🍳 食譜攻略圖鑑</a>
    <a href="#" onclick="alert('武器圖鑑正在籌備中！')">⚔️ 裝備圖鑑</a>
    <a href="Ingredients.html" style="background-color: var(--accent-color); color: #1a1a1a;">🪵 食材物資圖鑑</a>
    <a href="#" onclick="alert('生物圖鑑正在籌備中！')">🧟 生物圖鑑</a>
    <a href="gacha.html">🎁 物資盲盒抽獎</a>
    <a href="stats.html">📊 使用者統計</a>
</div>

<div class="top-nav-bar">
    <div class="menu-btn" onclick="toggleSidebar(true)">☰ 選單</div>
</div>

<div class="ingredients-container">
    <h2>🪵 基礎食材物資圖鑑</h2>
    <div class="subtitle">末日烹飪的基石，了解食材來源是每位倖存者必修課。</div>

    <div class="ingredients-grid" id="ingredientsGrid"></div>
</div>

<script src="js/ingredients-data.js"></script>

<script>
    renderIngredients();

    function renderIngredients() {
        const grid = document.getElementById('ingredientsGrid');
        
        const htmlContent = INGREDIENTS_DATA.map(item => `
            <div class="ingredient-card">
                <div class="image-container">
                    <span class="no-img-text">[ 補給物資照片 ]</span>
                    <img src="${item.image}" alt="${item.name}" class="ingredient-img" onerror="this.style.display='none'">
                </div>
                <div class="card-content">
                    <div class="ingredient-name">
                        ${item.name}
                        <span class="rarity-tag ${item.rarity}">${item.rarityText}</span>
                    </div>
                    <p class="description">${item.description}</p>
                    <div class="source-box">
                        <div class="source-title">📍 獲取來源</div>
                        <div class="source-text">${item.source}</div>
                    </div>
                </div>
            </div>
        `).join('');

        grid.innerHTML = htmlContent;
    }

    function toggleSidebar(open) {
        const sidebar = document.getElementById('mySidebar');
        if (open) {
            sidebar.style.left = '0px'; 
        } else {
            sidebar.style.left = '-250px'; 
        }
    }
</script>

</body>
</html>
