<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日之後 - 食譜攻略大全</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #f39c12;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .recipe-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #444;
            text-align: center;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        .recipe-img {
            width: 100%;
            height: 150px;
            background-color: #3d3d3d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #888;
            object-fit: cover;
        }

        .recipe-name {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            position: relative;
            border: 2px solid var(--accent-color);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover { color: #fff; }

        .modal-title {
            color: var(--accent-color);
            margin-top: 0;
            font-size: 1.8rem;
        }

        .modal-section {
            margin: 15px 0;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .modal-section strong {
            color: #5dade2;
        }
    </style>
</head>
<body>

    <h1>錦囊妙計：明日之後食譜大全</h1>

    <div class="recipe-grid" id="recipeGrid"></div>

    <div class="modal" id="recipeModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalName">食譜名稱</h2>
            
            <div class="modal-section">
                <strong>【料理介紹】</strong>
                <p id="modalDesc"></p>
            </div>
            
            <div class="modal-section">
                <strong>【必備配方】</strong>
                <p id="modalFormula"></p>
            </div>
            
            <div class="modal-section">
                <strong>【美味效果】</strong>
                <p id="modalEffect"></p>
            </div>
        </div>
    </div>

    <script src="recipes.js"></script>

    <script>
        // 初始化網頁：確保數據載入後才動態生成卡片
        const grid = document.getElementById('recipeGrid');
        
        if (typeof recipes !== 'undefined' && recipes.length > 0) {
            recipes.forEach((recipe, index) => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.onclick = () => openModal(index);
                
                card.innerHTML = `
                    <img class="recipe-img" src="${recipe.img}" alt="${recipe.name}">
                    <div class="recipe-name">${recipe.name}</div>
                `;
                grid.appendChild(card);
            });
        } else {
            grid.innerHTML = "<p style='text-align:center; color:#ff4d4d;'>找不到食譜數據，請檢查 recipes.js 檔案！</p>";
        }

        const modal = document.getElementById('recipeModal');
        
        function openModal(index) {
            const r = recipes[index];
            document.getElementById('modalName').innerText = r.name;
            document.getElementById('modalDesc').innerText = r.desc;
            document.getElementById('modalFormula').innerText = r.formula;
            document.getElementById('modalEffect').innerText = r.effect;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
