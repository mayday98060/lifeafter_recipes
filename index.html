<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日之後食譜大全</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #f39c12;
            --modal-border: #f39c12;
            --section-border: #444;
        }
        
        [data-theme="light"] {
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #d35400; 
            --modal-border: #d35400;
            --section-border: #e0e0e0;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 128px);
            gap: 15px; 
            max-width: 1200px;
            margin: 0 auto;
            justify-content: center; 
        }

        .recipe-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

       .recipe-img {
            width: 128px;
            height: 128px;
            object-fit: cover;
            margin: 0;
            padding: 0;
            border: none;
        }

        .recipe-name {
            padding: 10px 5px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            background-color: var(--card-bg); /* 文字背景與卡片一致 */
        }

        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            position: relative;
            border: 2px solid var(--accent-color);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover { color: #fff; }

        .modal-title {
            color: var(--accent-color);
            margin-top: 0;
            font-size: 1.8rem;
        }

        .modal-section {
            margin: 15px 0;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .modal-section strong {
            color: #5dade2;
        }

        .theme-switch-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .theme-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--accent-color);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .theme-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 30px auto;
            text-align: center;
        }
        
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid var(--section-border);
            border-radius: 25px;
            background-color: var(--card-bg);
            color: var(--text-color);
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        #searchInput:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(243, 156, 18, 0.3);
        }

        .site-footer {
            margin-top: 50px; 
            padding: 20px 10px;
            background-color: var(--card-bg); 
            color: var(--text-color);
            border-top: 1px solid var(--section-border);
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .site-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        
        .site-footer a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        
        .site-footer .copyright {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="theme-switch-wrapper">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️ 淺色模式</button>
</div>

    <h1>明日之後食譜大全</h1>

    <div class="search-container">
    <input type="text" id="searchInput" placeholder="輸入料理名稱、食材或效果（如：鱈魚、暴擊）..." oninput="filterRecipes()">
</div>

    <div class="footer-content">
        <p>🕒 最後更新時間：2026 年 5 月 26 日</p>
        <p>📬 聯絡資訊 / 報錯回報：
            <a href="https://discord.gg/eF3XWnXP" target="_blank">Discord 交流群</a>
        </p>
    </div>

    <div class="recipe-grid" id="recipeGrid"></div>

    <div class="modal" id="recipeModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalName">食譜名稱</h2>
            
            <div class="modal-section">
                <strong>【料理介紹】</strong>
                <p id="modalDesc"></p>
            </div>
            
            <div class="modal-section">
                <strong>【食譜配方】</strong>
                <p id="modalFormula"></p>
            </div>
            
            <div class="modal-section">
                <strong>【美味效果】</strong>
                <p id="modalEffect"></p>
            </div>
        </div>
    </div>

    <script src="recipes.js"></script>

    <script>
        function displayRecipes(recipesToRender) {
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = "";
        
            if (recipesToRender.length === 0) {
                grid.innerHTML = "<p style='text-align:center; color:#888; grid-column: 1/-1;'>找不到符合條件的食譜 😭</p>";
                return;
            }
        
            recipesToRender.forEach((recipe) => {
                const originalIndex = recipes.findIndex(r => r.name === recipe.name);
        
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.onclick = () => openModal(originalIndex);
                
                card.innerHTML = `
                    <img class="recipe-img" src="${recipe.img}" alt="${recipe.name}">
                    <div class="recipe-name">${recipe.name}</div>
                `;
                grid.appendChild(card);
            });
        }
        
        function filterRecipes() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!keyword) {
                displayRecipes(recipes);
                return;
            }
        
            const filtered = recipes.filter(recipe => {
                return recipe.name.toLowerCase().includes(keyword) || 
                       recipe.formula.toLowerCase().includes(keyword) || 
                       recipe.desc.toLowerCase().includes(keyword) || 
                       recipe.effect.toLowerCase().includes(keyword);
            });
        
            displayRecipes(filtered);
        }
        
        if (typeof recipes !== 'undefined' && recipes.length > 0) {
            displayRecipes(recipes);
        } else {
            document.getElementById('recipeGrid').innerHTML = "<p style='text-align:center; color:#ff4d4d;'>找不到食譜數據，請檢查 recipes.js 檔案！</p>";
        }
        
        const modal = document.getElementById('recipeModal');
        
        function openModal(index) {
            const r = recipes[index];
            document.getElementById('modalName').innerText = r.name;
            document.getElementById('modalDesc').innerText = r.desc;
            document.getElementById('modalFormula').innerText = r.formula;
            document.getElementById('modalEffect').innerText = r.effect;
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            modal.style.display = 'none';
        }
        
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const themeBtn = document.getElementById('themeBtn');
            
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.innerText = "☀️ 淺色模式";
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeBtn.innerText = "🌙 深色模式";
            }
}
    </script>
</body>
</html>
