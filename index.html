<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末日生存指南</title>
    <style>
        /* 💡 補齊基礎顏色變數，讓樣式能正確顯色 */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #f39c12;
            --section-border: #444;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* 💡 頂部全寬導覽列（整合左邊按鈕與右邊登入資訊） */
        .navbar {
            background-color: var(--card-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            position: relative;
        }

        /* 💡 跟食譜大全一模一樣的膠囊選單按鈕 */
        .menu-btn {
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-color);
            background-color: var(--bg-color);
            border: 1px solid var(--accent-color);
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }
        
        /* 右側用戶資訊 */
        .user-info {
            font-size: 0.9rem;
            color: #aaa;
            display: flex;
            align-items: center;
        }

        .logout-btn {
            color: #ff4d4d;
            cursor: pointer;
            margin-left: 15px;
            text-decoration: underline;
            font-weight: bold;
        }

        /* 側邊欄滑出式選單 */
        .sidebar {
            position: fixed;
            top: 0; 
            left: -250px;
            width: 250px; 
            height: 100%;
            background-color: var(--card-bg);
            z-index: 2000;
            transition: 0.3s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            padding-top: 60px;
            box-sizing: border-box;
            border-right: 1px solid var(--section-border);
        }
        
        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--section-border);
            transition: all 0.2s;
        }
        
        .sidebar a:hover {
            background-color: var(--accent-color);
            color: #fff;
        }
        
        .close-sidebar {
            position: absolute;
            top: 15px; 
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-color);
        }
        
        /* 主體卡片區 */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 { 
            color: var(--accent-color); 
            margin-bottom: 40px; 
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .portal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--section-border);
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .portal-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.2);
        }

        .portal-card h3 { 
            color: var(--accent-color); 
            margin-top: 0; 
            font-size: 1.4rem; 
        }

        .portal-card p { 
            color: #aaa; 
            font-size: 0.9rem; 
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="mySidebar">
        <span class="close-sidebar" onclick="toggleSidebar(false)">&times;</span>
        <a href="#" onclick="toggleSidebar(false)" style="background-color: var(--accent-color); color: #1a1a1a;">🏠 主頁</a>
        <a href="recipes-page.html">🍳 食譜攻略圖鑑</a>
        <a href="#" onclick="alert('武器圖鑑正在籌備中！')">⚔️ 裝備圖鑑</a>
        <a href="#" onclick="alert('資源圖鑑正在籌備中！')">🗺️ 資源圖鑑</a>
        <a href="#" onclick="alert('生物圖鑑正在籌備中！')">🧟 生物圖鑑</a>
    </div>

    <div class="navbar">
        <div class="menu-btn" onclick="toggleSidebar(true)">☰ 選單</div>
        <div class="user-info">
            <span id="userInfo">載入中...</span>
            <span class="logout-btn" onclick="logout()">登出</span>
        </div>
    </div>

    <div class="container">
        <h1>末日生存指南</h1>
        <div class="grid">
            <div class="portal-card" onclick="window.location.href='recipes-page.html'">
                <h3>🍳 明日之後食譜大全</h3>
                <p>收錄全網最完整的末日料理，支援多功能模糊搜尋與效果加成查詢。</p>
            </div>
            <div class="portal-card" onclick="alert('護甲與武器圖鑑正在加緊製作中！')">
                <h3>⚔️ 裝備圖鑑</h3>
                <p>護甲、槍械、冷兵器、護盾與帽子的製作材料清單（未開放）。</p>
            </div>
            <div class="portal-card" onclick="alert('採集資源地圖即將登場！')">
                <h3>🗺️ 資源圖鑑</h3>
                <p>各資源介紹與獲取來源（未開放）。</p>
            </div>
            <div class="portal-card" onclick="alert('採集資源地圖即將登場！')">
                <h3>🧟 生物圖鑑</h3>
                <p>包含動物，感染者，人形怪等（未開放）。</p>
            </div>
        </div>
    </div>

    <script>
        // 驗證是否登入，沒登入就踢回登入頁
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(currentUser);
            document.getElementById('userInfo').innerText = `【${user.server}】 歡迎回來，${user.name} 倖存者`;
        }

        // 側邊欄控制
        function toggleSidebar(open) {
            const sidebar = document.getElementById('mySidebar');
            if (open) {
                sidebar.style.left = '0px'; // 讓選單滑出來
            } else {
                sidebar.style.left = '-250px'; // 讓選單縮回去
            }
        }

        // 登出
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
