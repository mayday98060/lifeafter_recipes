<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日之後圖鑑 - 登入/註冊</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: #2d2d2d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            width: 350px;
            border: 1px solid #f39c12;
        }
        h2 {
            text-align: center;
            color: #f39c12;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus { 
            border-color: #f39c12; 
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #f39c12;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #e67e22; }
        .toggle-text {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #5dade2;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div id="loginForm">
        <h2>倖存者登入</h2>
        <div class="form-group">
            <label>遊戲名稱 (暱稱)</label>
            <input type="text" id="loginName" placeholder="請輸入遊戲名稱">
        </div>
        <div class="form-group">
            <label>密碼</label>
            <input type="password" id="loginPwd" placeholder="請輸入密碼">
        </div>
        <button class="btn" onclick="handleLogin()">登入營地</button>
        <p class="toggle-text" onclick="toggleForm(true)">還沒有帳號？前往註冊</p>
    </div>

    <div id="registerForm" style="display: none;">
        <h2>新倖存者註冊</h2>
        <div class="form-group">
            <label>選擇伺服器</label>
            <select id="regServer">
                <optgroup label="—— 繁體中文伺服器 ——">
                    <option value="多貝雪山_台服">多貝雪山</option>
                    <option value="觸星山脈_台服">觸星山脈</option>
                    <option value="諾倫半島_台服">諾倫半島</option>
                    <option value="長嶺舊港_台服">長嶺舊港</option>
                    <option value="平樂古城_台服">平樂古城</option>
                    <option value="聖托帕尼_台服">聖托帕尼</option>
                    <option value="貝侖草原_台服">貝侖草原</option>
                    <option value="墜星海畔_台服">墜星海畔</option>
                    <option value="梅爾醫院_台服">梅爾醫院</option>
                    <option value="萊文市_台服">萊文市</option>
                    <option value="方舟基地_台服">方舟基地</option>
                    <option value="重啟之地_台服">重啟之地</option>
                    <option value="地下城_台服">地下城</option>
                    <option value="希望之牆_台服">希望之牆</option>
                    <option value="深海秘境_台服">深海秘境</option>
                </optgroup>
        
                <optgroup label="—— 亞太伺服器 ——">
                    <option value="AsiaSurvival">AsiaSurvival</option>
                    <option value="LuckySurvival">LuckySurvival</option>
                    <option value="RebornDay">RebornDay</option>
                </optgroup>

                <optgroup label="—— 簡單生存伺服器 ——">
                    <option value="簡單生存服">簡單生存服</option>
                    <option value="鷺水度假村">鷺水度假村</option>
                </optgroup>
            </select>
        </div>
        <div class="form-group">
            <label>遊戲名稱 (暱稱)</label>
            <input type="text" id="regName" placeholder="請輸入遊戲角色名稱">
        </div>
        <div class="form-group">
            <label>設定密碼</label>
            <input type="password" id="regPwd" placeholder="請設定密碼">
        </div>
        <button class="btn" onclick="handleRegister()">完成註冊</button>
        <p class="toggle-text" onclick="toggleForm(false)">已有帳號？返回登入</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = "https://kcvojcfjstuxqausebuu.supabase.co"; 
    // ⚠️ 這裡請確保換成你剛剛複製的、完整的超長金鑰！
    const SUPABASE_KEY = "你複製的超長金鑰"; 
    
    // 💡 修正點：將變數名稱改成 db，徹底避開命名衝突！
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 表單切換
    function toggleForm(showRegister) {
        document.getElementById('loginForm').style.display = showRegister ? 'none' : 'block';
        document.getElementById('registerForm').style.display = showRegister ? 'block' : 'none';
    }

    // 註冊
    async function handleRegister() {
        const server = document.getElementById('regServer').value;
        const name = document.getElementById('regName').value.trim();
        const pwd = document.getElementById('regPwd').value.trim();

        if(!name || !pwd) { alert('請填寫完整資訊！'); return; }

        try {
            // 💡 這裡改成用 db 查詢
            const { data: existingUser, error: checkError } = await db
                .from('users')
                .select('*')
                .eq('username', name)
                .maybeSingle();

            if (existingUser) {
                alert('這個遊戲名稱已經被註冊過囉！');
                return;
            }

            // 💡 這裡改成用 db 寫入
            const { error } = await db
                .from('users')
                .insert([{ username: name, password: pwd, server: server, credits: 1000 }]);

            if (error) {
                alert('註冊失敗：' + error.message);
            } else {
                alert('註冊成功！已切換至登入畫面。');
                toggleForm(false);
                document.getElementById('loginName').value = name;
            }
        } catch (err) {
            alert('註冊連線錯誤：' + err.message);
        }
    }

    // 登入
    async function handleLogin() {
        const name = document.getElementById('loginName').value.trim();
        const pwd = document.getElementById('loginPwd').value.trim();

        if(!name || !pwd) { alert('請輸入名稱與密碼！'); return; }

        try {
            // 💡 這裡改成用 db 查詢
            const { data: userData, error } = await db
                .from('users')
                .select('*')
                .eq('username', name)
                .maybeSingle();

            if(error || !userData) { 
                alert('找不到該用戶，請先確認名字是否正確！'); 
                return; 
            }
            
            if(userData.password === pwd) {
                const sessionUser = { 
                    server: userData.server, 
                    name: userData.username, 
                    credits: userData.credits 
                };
                localStorage.setItem('currentUser', JSON.stringify(sessionUser));
                window.location.href = 'index.html';
            } else {
                alert('密碼錯誤！');
            }
        } catch (err) {
            alert('登入連線錯誤：' + err.message);
        }
    }
</script>
</body>
</html>
