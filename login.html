<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日之後圖鑑 - 登入/註冊</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: #2d2d2d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            width: 350px;
            border: 1px solid #f39c12;
        }
        h2 {
            text-align: center;
            color: #f39c12;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus { 
            border-color: #f39c12; 
        }
        /* 讓下拉選單的箭頭跟背景好看一點 */
        select {
            cursor: pointer;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #f39c12;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #e67e22; }
        .toggle-text {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #5dade2;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div id="loginForm">
        <h2>倖存者登入</h2>
        <div class="form-group">
            <label>遊戲名稱 (暱稱)</label>
            <input type="text" id="loginName" placeholder="請輸入遊戲名稱">
        </div>
        <div class="form-group">
            <label>密碼</label>
            <input type="password" id="loginPwd" placeholder="請輸入密碼">
        </div>
        <button class="btn" onclick="handleLogin()">登入營地</button>
        <p class="toggle-text" onclick="toggleForm(true)">還沒有帳號？前往註冊</p>
    </div>

    <div id="registerForm" style="display: none;">
        <h2>新倖存者註冊</h2>
        
        <div class="form-group">
            <label>選擇伺服器</label>
            <select id="regServer">
                <optgroup label="—— 台港澳伺服器 ——">
                    <option value="多貝雪山_台服">多貝雪山 (台服)</option>
                    <option value="觸星山脈_台服">觸星山脈 (台服)</option>
                    <option value="諾倫半島_台服">諾倫半島 (台服)</option>
                    <option value="長嶺舊港_台服">長嶺舊港 (台服)</option>
                    <option value="平樂古城_台服">平樂古城 (台服)</option>
                    <option value="聖托帕尼_台服">聖托帕尼 (台服)</option>
                    <option value="貝侖草原_台服">貝侖草原 (台服)</option>
                    <option value="墜星海畔_台服">墜星海畔 (台服)</option>
                    <option value="梅爾醫院_台服">梅爾醫院 (台服)</option>
                    <option value="萊文市_台服">萊文市 (台服)</option>
                    <option value="方舟基地_台服">方舟基地 (台服)</option>
                    <option value="重啟之地_台服">重啟之地 (台服)</option>
                    <option value="地下城_台服">地下城 (台服)</option>
                    <option value="希望之牆_台服">希望之牆 (台服)</option>
                    <option value="深海秘境_台服">深海秘境 (台服)</option>
                </optgroup>
        
                <optgroup label="—— 亞太混合伺服器 ——">
                    <option value="AsiaSurvival">AsiaSurvival</option>
                    <option value="LuckySurvival">LuckySurvival</option>
                    <option value="RebornDay">RebornDay</option>
                </optgroup>

                <optgroup label="—— 簡單生存伺服器 ——">
                    <option value="簡單生存服">簡單生存服</option>
                    <option value="鷺水度假村">鷺水度假村</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>遊戲名稱 (暱稱)</label>
            <input type="text" id="regName" placeholder="請輸入遊戲角色名稱">
        </div>
        <div class="form-group">
            <label>設定密碼</label>
            <input type="password" id="regPwd" placeholder="請設定密碼">
        </div>
        <button class="btn" onclick="handleRegister()">完成註冊</button>
        <p class="toggle-text" onclick="toggleForm(false)">已有帳號？返回登入</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ✍️ 請把你在第二步複製的 URL 和 anon key 貼到下面這兩行
    const SUPABASE_URL = "https://你的專案網址.supabase.co"; 
    const SUPABASE_KEY = "你的anon密鑰";
    
    // 初始化 Supabase 連線
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 切換登入與註冊畫面
    function toggleForm(showRegister) {
        document.getElementById('loginForm').style.display = showRegister ? 'none' : 'block';
        document.getElementById('registerForm').style.display = showRegister ? 'block' : 'none';
    }

    // 🔥 雲端註冊邏輯
    async function handleRegister() {
        const server = document.getElementById('regServer').value;
        const name = document.getElementById('regName').value.trim();
        const pwd = document.getElementById('regPwd').value.trim();

        if(!name || !pwd) { alert('請填寫完整資訊！'); return; }

        // 1. 先去雲端查這個名字有沒有人註冊過
        const { data: existingUser, error: checkError } = await supabase
            .from('users')
            .select('*')
            .eq('username', name)
            .maybeSingle();

        if (existingUser) {
            alert('這個遊戲名稱已經被註冊過囉，換一個試試吧！');
            return;
        }

        // 2. 塞入新玩家資料到 Supabase
        const { data, error } = await supabase
            .from('users')
            .insert([{ username: name, password: pwd, server: server, credits: 1000 }]);

        if (error) {
            alert('註冊失敗，請檢查資料庫設定：' + error.message);
        } else {
            alert(`註冊成功！\n歡迎加入【${server}】伺服器！\n已自動為你切換至登入畫面。`);
            toggleForm(false);
            document.getElementById('loginName').value = name;
        }
    }

    // 🔥 雲端登入邏輯
    async function handleLogin() {
        const name = document.getElementById('loginName').value.trim();
        const pwd = document.getElementById('loginPwd').value.trim();

        if(!name || !pwd) { alert('請輸入名稱與密碼！'); return; }

        // 去 Supabase 撈取這個名字的資料
        const { data: userData, error } = await supabase
            .from('users')
            .select('*')
            .eq('username', name)
            .maybeSingle();

        if(error || !userData) { 
            alert('找不到該用戶，請先確認名字是否輸入正確或重新註冊！'); 
            return; 
        }

        // 比對密碼是否正確
        if(userData.password === pwd) {
            // 為了讓主頁（index.html）依然能抓到是誰登入，我們把登入成功的這名玩家暫存起來
            const sessionUser = { server: userData.server, name: userData.username };
            localStorage.setItem('currentUser', JSON.stringify(sessionUser));
            
            window.location.href = 'index.html'; // 成功登入，跳轉大主頁！
        } else {
            alert('密碼錯誤！');
        }
    }
</script>
    
</body>
</html>
