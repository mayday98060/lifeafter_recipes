<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末世生存指南 - 各伺服器使用者人數統計</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #f39c12;
            --section-border: #444;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stats-container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #f39c12;
            box-sizing: border-box;
            margin-top: 40px;
        }
        h2 {
            text-align: center;
            color: #f39c12;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .stats-list {
            list-style: none;
            padding: 0;
            margin: 0 0 25px 0;
        }
        .stats-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #1a1a1a;
            margin-bottom: 12px;
            border-radius: 6px;
            border-left: 4px solid #5dade2;
            font-size: 1.1rem;
        }
        .server-name {
            font-weight: bold;
            color: #ddd;
        }
        .player-count {
            color: #f39c12;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .btn-back {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #444;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
            box-sizing: border-box;
        }
        .btn-back:hover {
            background-color: #555;
        }
        .loading {
            text-align: center;
            color: #aaa;
            font-style: italic;
        }

        .top-nav-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 99;
        }
        
        .menu-btn {
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-color);
            background-color: var(--card-bg);
            border: 1px solid var(--accent-color);
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .menu-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }
        
        .sidebar {
            position: fixed;
            top: 0; 
            left: -250px; 
            width: 250px; 
            height: 100%;
            background-color: var(--card-bg);
            z-index: 2000; 
            transition: 0.3s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            padding-top: 60px;
            box-sizing: border-box;
            border-right: 1px solid var(--section-border);
        }
        
        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--section-border);
            transition: all 0.2s;
        }
        
        .sidebar a:hover {
            background-color: var(--accent-color);
            color: #fff;
        }
        
        .close-sidebar {
            position: absolute;
            top: 15px; 
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <span class="close-sidebar" onclick="toggleSidebar(false)">&times;</span>
    <a href="index.html">🏠 主頁</a>
    <a href="recipes-page.html">🍳 食譜攻略圖鑑</a>
    <a href="#" onclick="alert('武器圖鑑正在籌備中！')">⚔️ 裝備圖鑑</a>
    <a href="#" onclick="alert('資源圖鑑正在籌備中！')">🗺️ 資源圖鑑</a>
    <a href="#" onclick="alert('生物圖鑑正在籌備中！')">🧟 生物圖鑑</a>
    <a href="stats.html" style="background-color: var(--accent-color); color: #1a1a1a;">📊 使用者統計</a>
</div>

<div class="top-nav-bar">
    <div class="menu-btn" onclick="toggleSidebar(true)">☰ 選單</div>
</div>

<div class="stats-container">
    <h2>📊 各伺服器使用者人數統計</h2>
    
    <div id="statsBox" class="loading">正在連線至雲端，計算各伺服器倖存者人數...</div>

    <a href="index.html" class="btn-back">返回主頁</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = "https://kcvojcfjstuxqausebuu.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_gthqBZh-RlfA7G4FScDMwQ_6HX3pd9j";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    fetchServerStats();

    async function fetchServerStats() {
        try {
            const { data, error } = await db
                .from('users')
                .select('server');

            if (error) throw error;

            const stats = {};
            data.forEach(user => {
                if (user.server) {
                    stats[user.server] = (stats[user.server] || 0) + 1;
                }
            });

            const statsBox = document.getElementById('statsBox');
            
            if (Object.keys(stats).length === 0) {
                statsBox.className = "";
                statsBox.innerHTML = "<p style='text-align:center; color:#aaa;'>目前暫無倖存者註冊數據。</p>";
                return;
            }

            let htmlContent = '<ul class="stats-list">';
            for (const [serverName, count] of Object.entries(stats)) {
                htmlContent += `
                    <li class="stats-item">
                        <span class="server-name">📍 ${serverName}</span>
                        <span class="player-count">${count} 人</span>
                    </li>
                `;
            }
            htmlContent += '</ul>';

            statsBox.className = "";
            statsBox.innerHTML = htmlContent;

        } catch (err) {
            console.error("統計失敗：", err.message);
            document.getElementById('statsBox').innerHTML = `<p style="color: #e74c3c; text-align:center;">數據載入失敗，請檢查網路連線。</p>`;
        }
    }

    function toggleSidebar(open) {
        const sidebar = document.getElementById('mySidebar');
        if (open) {
            sidebar.style.left = '0px'; 
        } else {
            sidebar.style.left = '-250px'; 
        }
    }
</script>

</body>
</html>
